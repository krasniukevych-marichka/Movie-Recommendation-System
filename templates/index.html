<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Recommender</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.7);
    --accent: #8b5cf6;
    --accent-hover: #7c3aed;
    --star-color: #fbbf24;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background-color: var(--bg-color);
    background-image: 
      radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.1) 0px, transparent 50%);
    color: var(--text-main);
    line-height: 1.6;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  h1 {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(to right, #fff, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }

  .subtitle { color: var(--text-dim); font-size: 1.1rem; }

  /* Grid Layout */
  #movie-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  /* Card Design */
  .card {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 1rem 1.5rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    animation: fadeIn 0.5s ease backwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: scale(1.02);
    border-color: rgba(139, 92, 246, 0.5);
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
  }

  .card.skipped { opacity: 0.4; filter: grayscale(1); }
  .card.rated { border-left: 4px solid var(--accent); }

  .card-title {
    flex: 1;
    font-weight: 500;
    font-size: 1rem;
    color: var(--text-main);
  }

  /* Stars */
  .stars { display: flex; gap: 4px; }
  .star {
    font-size: 1.5rem;
    cursor: pointer;
    color: #334155;
    transition: transform 0.2s, color 0.2s;
  }
  .star:hover { transform: scale(1.2); }
  .star.on { color: var(--star-color); text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }

  /* Buttons */
  .skip {
    background: transparent;
    border: 1px solid #334155;
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.2s;
  }
  .skip.active { background: #ef4444; color: white; border-color: #ef4444; }
  .skip:hover:not(.active) { border-color: var(--text-dim); color: #fff; }

  #submit-btn {
    display: none;
    margin: 3rem auto 0;
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5);
    transition: all 0.3s;
  }

  #submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 15px 25px -5px rgba(139, 92, 246, 0.6);
  }

  #submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Results Section */
  #results {
    display: none;
    margin-top: 4rem;
    padding: 2rem;
    background: rgba(15, 23, 42, 0.8);
    border-radius: 24px;
    border: 1px solid var(--accent);
  }

  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .result-info { display: flex; align-items: center; gap: 1rem; }
  .rank { 
    background: var(--accent); 
    width: 28px; height: 28px; 
    border-radius: 50%; 
    display: grid; place-items: center; 
    font-size: 0.8rem; font-weight: bold;
  }

  #error {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    padding: 1rem;
    border-radius: 12px;
    margin-top: 1rem;
    text-align: center;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  @media (max-width: 600px) {
    .card { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .stars { width: 100%; justify-content: space-between; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Movie Recommender</h1>
    <p class="subtitle">Rate these titles to discover your next favorite film</p>
  </header>

  <div id="movie-list">Loading your library...</div>

  <button id="submit-btn" onclick="submitRatings()">Get My Recommendations</button>
  
  <div id="error"></div>

  <div id="results">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">🍿 Recommended for You</h2>
    <div id="results-list"></div>
    <div style="text-align: center;">
      <button id="reset-btn" onclick="resetUI()" style="margin-top: 2rem; background: none; border: none; color: var(--text-dim); cursor: pointer; text-decoration: underline;">Reset & Rate Again</button>
    </div>
  </div>
</div>

<script>
  let movies = [];
  const ratings = {};
  const skipped = {};

  // 1. Load
  fetch('/static/selected_movies.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => { movies = data; render(); })
    .catch(() => {
      document.getElementById('movie-list').textContent = 'Error: Could not load the movie database.';
    });

  // 2. Render
  function render() {
    const el = document.getElementById('movie-list');
    el.innerHTML = '';

    movies.forEach((m, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = 'row-' + m.id;
      card.style.animationDelay = (index * 0.05) + 's';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = m.title;

      const stars = document.createElement('div');
      stars.className = 'stars';
      for (let s = 1; s <= 5; s++) {
        const star = document.createElement('span');
        star.className = 'star';
        star.innerHTML = '✦'; 
        star.id = 'star-' + m.id + '-' + s;
        star.onclick = () => rate(m.id, s);
        stars.appendChild(star);
      }

      const skip = document.createElement('button');
      skip.className = 'skip';
      skip.id = 'skip-' + m.id;
      skip.textContent = "Haven't seen";
      skip.onclick = () => toggleSkip(m.id);

      card.append(title, stars, skip);
      el.appendChild(card);
    });

    document.getElementById('submit-btn').style.display = 'block';
  }

  function rate(id, val) {
    ratings[id] = val;
    delete skipped[id];
    for (let s = 1; s <= 5; s++) {
      const el = document.getElementById('star-' + id + '-' + s);
      if (el) el.className = 'star' + (s <= val ? ' on' : '');
    }
    document.getElementById('row-' + id).className = 'card rated';
    document.getElementById('skip-' + id).classList.remove('active');
  }

  function toggleSkip(id) {
    if (skipped[id]) {
      delete skipped[id];
      document.getElementById('row-' + id).className = 'card';
      document.getElementById('skip-' + id).classList.remove('active');
    } else {
      skipped[id] = true;
      delete ratings[id];
      for (let s = 1; s <= 5; s++) {
        const el = document.getElementById('star-' + id + '-' + s);
        if (el) el.className = 'star';
      }
      document.getElementById('row-' + id).className = 'card skipped';
      document.getElementById('skip-' + id).classList.add('active');
    }
  }

  function submitRatings() {
    const payload = movies.map(m => ({
      id: m.id,
      title: m.title,
      rating: ratings[m.id] ?? null,
    }));

    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error');
    btn.disabled = true;
    btn.textContent = 'Analyzing preferences...';
    errEl.style.display = 'none';

    fetch('/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    })
      .then(r => { if (!r.ok) throw new Error('Server error ' + r.status); return r.json(); })
      .then(data => {
        btn.disabled = false;
        btn.textContent = 'Get My Recommendations';
        showResults(data);
      })
      .catch(err => {
        btn.disabled = false;
        btn.textContent = 'Try Again';
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      });
  }

  function showResults(data) {
    const list = document.getElementById('results-list');
    list.innerHTML = '';
    data.slice(0, 5).forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `
        <div class="result-info">
          <span class="rank">${i+1}</span>
          <span class="result-title">${item.title}</span>
        </div>
        <div style="color: var(--star-color); font-weight: bold;">
          ${Number(item.predicted_rating).toFixed(1)} <span style="font-size: 0.8rem; color: var(--text-dim)">/ 5</span>
        </div>
      `;
      list.appendChild(div);
    });
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }

  function resetUI() {
    Object.keys(ratings).forEach(k => delete ratings[k]);
    Object.keys(skipped).forEach(k => delete skipped[k]);
    document.getElementById('results').style.display = 'none';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
